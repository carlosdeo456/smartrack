# Render free web service + Neon PostgreSQL (no Render DB = no payment prompt for DB)
# Fixed URL: https://smartrack-api.onrender.com
# See docs/RENDER_DEPLOY.md

services:
  - type: web
    name: smartrack-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGINS
        value: https://smartrack-806fb.web.app,https://smartrack-uxeb.vercel.app,https://smartrack-806fb.firebaseapp.com
      - key: ENABLE_SIMULATED_GPS
        value: false
