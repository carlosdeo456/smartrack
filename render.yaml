# Force Render to use GitHub repo + Neon (not Render Postgres)
# After push: Render Dashboard → Blueprints → Sync

services:
  - type: web
    name: smartrack-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGINS
        value: https://smartrack-806fb.web.app,https://smartrack-uxeb.vercel.app,https://smartrack-806fb.firebaseapp.com
      - key: ENABLE_SIMULATED_GPS
        value: false
